name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core + dev only; no GPU/extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Types (mypy strict)
        run: mypy src/lerobot_curate
      - name: Tests (stub embedder, synthetic fixtures, no network)
        env:
          LEROBOT_CURATE_EMBEDDER: stub
          HF_HUB_OFFLINE: "1"
        run: pytest -q --cov=lerobot_curate --cov-report=term-missing

  honesty:
    name: honest-marketing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No performance/policy claims and no overclaim phrasing
        run: |
          # ERE, real exit code, no whitelist. Targets perf/policy claims and
          # marketing overclaims. The bare word "first" is intentionally NOT
          # forbidden (it false-positives on legitimate "first frame" in code).
          if grep -REn '15\.4|\+32\.9|policy.{0,5}(gain|improvement|success)|success.?rate|SOTA|state.of.the.art|outperform|world.?s? first|first (ever|to ship|shipped)|fully automatic|completely automatic|\+[0-9]+(\.[0-9]+)?[[:space:]]*%|永続' README.md docs/ src/ ; then
            echo "HONEST-MARKETING VIOLATION: forbidden claim/phrase found above"
            exit 1
          fi
          echo "no forbidden claims"
      - name: Verbatim scope disclaimer present
        run: |
          grep -qF "does NOT reproduce their reported policy-performance gains" README.md || {
            echo "MISSING DISCLAIMER in README.md"
            exit 1
          }
          echo "disclaimer present"

  no-weights:
    name: no-committed-weights
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No model weights / data shards tracked in git
        run: |
          if git ls-files | grep -E '\.(onnx|safetensors|bin|pt|pth|gguf|ckpt|parquet)$' ; then
            echo "WEIGHTS/DATA COMMITTED TO GIT — forbidden"
            exit 1
          fi
          echo "no tracked weights/data"

  build:
    name: build (sdist+wheel, weight-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Assert artifacts contain no weights
        run: |
          for art in dist/*.tar.gz dist/*.whl ; do
            if python - "$art" <<'PY'
          import sys, tarfile, zipfile, re
          path = sys.argv[1]
          pat = re.compile(r"\.(onnx|safetensors|bin|pt|pth|gguf|ckpt|parquet)$")
          names = (tarfile.open(path).getnames() if path.endswith(".tar.gz")
                   else zipfile.ZipFile(path).namelist())
          bad = [n for n in names if pat.search(n)]
          print("OK", path) if not bad else (print("BAD", path, bad) or sys.exit(1))
          PY
            then :; else echo "weight found in $art"; exit 1; fi
          done
